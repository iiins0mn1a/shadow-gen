# High-fidelity Ethereum-like checkpoint/restore test derived from shadow-ethereum/shadow.yaml.
# __APP_PATH__ and __SHARED_DIR__ are rendered by orchestrator_verify.py.

general:
  stop_time: 240s
  data_directory: ./shadow.data
  log_level: info

network:
  graph:
    type: gml
    inline: |
      graph [
        directed 0
        node [
          id 0
          host_bandwidth_up "1000 Gbit"
          host_bandwidth_down "1000 Gbit"
        ]
        edge [
          source 0
          target 0
          latency "100 ms"
          packet_loss 0.0
        ]
      ]

hosts:
  geth-node:
    network_node_id: 0
    ip_addr: 11.0.2.10
    processes:
      - path: /usr/bin/python3
        args: __APP_PATH__
        start_time: 1s
        expected_final_state: running
        environment:
          ROLE: geth-node
          HOST_IP: 11.0.2.10
          INTERVAL_SEC: "1"
          AUTHRPC_PORT: "8200"
          HTTP_PORT: "8000"
          WS_PORT: "8100"
          METRICS_PORT: "8300"
          P2P_PORT: "8400"

  prysm-beacon-1:
    network_node_id: 0
    ip_addr: 11.0.0.0
    processes:
      - path: /usr/bin/python3
        args: __APP_PATH__
        start_time: 5s
        expected_final_state: running
        environment:
          ROLE: beacon-1
          HOST_IP: 11.0.0.0
          INTERVAL_SEC: "1"
          EXEC_HOST_IP: 11.0.2.10
          EXEC_AUTHRPC_PORT: "8200"
          RPC_PORT: "4000"
          GRPC_PORT: "4100"
          P2P_TCP_PORT: "4200"
          P2P_UDP_PORT: "4300"
          MON_PORT: "4400"
          MAX_PEER_FANOUT: "3"
          COMMON_PEER_FILE: "__SHARED_DIR__/beacon_peers.txt"
          PUBLISH_PEER_FILE: "__SHARED_DIR__/published/beacon-1.addr"
      - path: /usr/bin/python3
        args: __APP_PATH__
        start_time: 6s
